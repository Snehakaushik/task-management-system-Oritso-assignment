<!DOCTYPE html>
<html>
<head>
    <title>Task Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2 class="mb-4">Task Management System</h2>

<!-- Search -->

<div class="mb-3">

<input type="text" id="searchKeyword" class="form-control" placeholder="Search tasks...">

<button class="btn btn-primary mt-2" onclick="searchTasks()">Search</button>

<button class="btn btn-secondary mt-2" onclick="loadTasks()">Reset</button>

</div>


<!-- Task Form -->

<div class="card p-3 mb-4">

<h5>Add / Update Task</h5>

<input type="hidden" id="taskId">

<input type="text" id="taskTitle" class="form-control mb-2" placeholder="Task Title">

<textarea id="taskDescription" class="form-control mb-2" placeholder="Task Description"></textarea>

<input type="date" id="taskDueDate" class="form-control mb-2">

<select id="taskStatus" class="form-control mb-2">

<option>PENDING</option>

<option>IN_PROGRESS</option>

<option>COMPLETED</option>

</select>

<input type="text" id="taskRemarks" class="form-control mb-2" placeholder="Remarks">

<button class="btn btn-success" onclick="saveTask()">Save Task</button>

</div>


<!-- Task Table -->

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>

<th>Title</th>

<th>Status</th>

<th>Due Date</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="taskTable"></tbody>

</table>


<script src="script.js"></script>

</body>

</html>
